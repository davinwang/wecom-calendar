name: wecom-calendar
version: "1.0.0"
description: 企业微信日历管理 - 创建/查询/更新/删除日程，支持重复事件和提醒
author: OpenClaw Workspace
license: MIT
tags:
  - wecom
  - calendar
  - 企业微信
  - 日程
  - 日历
  - schedule
  - office
entry: calendar.mjs
files:
  - calendar.mjs
  - package.json
  - SKILL.md
  - README.md
  - .env.example
env:
  - name: WECOM_CORP_ID
    description: 企业微信企业 ID
    required: true
  - name: WECOM_AGENT_ID
    description: 应用 AgentId
    required: true
  - name: WECOM_AGENT_SECRET
    description: 应用 Secret
    required: true
requirements:
  bins:
    - node
    - npm
  npm:
    - axios
    - dotenv
examples:
  - name: 创建日程
    command: node calendar.mjs add --summary "会议" --start 1709280000 --end 1709283600
  - name: 获取日程列表
    command: node calendar.mjs list --cal_id "xxx"
  - name: 创建重复日程
    command: node calendar.mjs add --summary "周例会" --start 1709280000 --end 1709283600 --repeat 1 --repeat-type 1 --repeat-day-of-week 1
  - name: 取消日程
    command: node calendar.mjs cancel --schedule_id "xxx"
